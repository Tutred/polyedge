<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PolyEdge — Арбитраж Polymarket & Kalshi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');

:root {
  --bg:     #0a0d12;
  --card:   #0f1420;
  --card2:  #141b27;
  --border: #1e2d3d;
  --bord2:  #263545;
  --poly:   #00c2ff;
  --kalshi: #9b6cff;
  --book:   #60a5fa;
  --green:  #22c55e;
  --red:    #ef4444;
  --yellow: #f59e0b;
  --text:   #e2e8f0;
  --muted:  #475569;
  --muted2: #64748b;
  --mono:   'IBM Plex Mono', monospace;
  --sans:   'Inter', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bord2);border-radius:3px}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:100;background:rgba(10,13,18,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;gap:16px}
.logo{font-family:var(--mono);font-size:17px;font-weight:700;letter-spacing:-.5px;white-space:nowrap}
.logo span{color:var(--poly)}
.logo small{font-size:10px;color:var(--muted2);font-weight:400;margin-left:8px;letter-spacing:0}
.hstats{display:flex;gap:20px}
.hs{text-align:center}
.hs-v{font-family:var(--mono);font-size:15px;font-weight:700}
.hs-l{font-size:9px;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.hright{display:flex;align-items:center;gap:8px}
.live{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:9px;color:var(--green);text-transform:uppercase;letter-spacing:2px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);padding:4px 11px;border-radius:20px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 5px var(--green)}50%{opacity:.3;box-shadow:none}}
.rbtn{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:1px;background:transparent;border:1px solid var(--border);color:var(--muted2);padding:5px 12px;border-radius:3px;cursor:pointer;transition:all .2s}
.rbtn:hover{border-color:var(--poly);color:var(--poly)}

/* ── STATUS ── */
.sbar{background:var(--card);border-bottom:1px solid var(--border);padding:7px 28px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.src{font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:12px;display:flex;align-items:center;gap:5px}
.src .sd{width:6px;height:6px;border-radius:50%}
.s-ok  {background:rgba(34,197,94,.08); color:var(--green); border:1px solid rgba(34,197,94,.2)}
.s-wait{background:rgba(245,158,11,.08);color:var(--yellow);border:1px solid rgba(245,158,11,.2)}
.s-err {background:rgba(239,68,68,.08); color:var(--red);   border:1px solid rgba(239,68,68,.2)}

/* ── FILTERS ── */
.fbar{padding:12px 28px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border)}
.fbtn{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1px;background:transparent;border:1px solid var(--border);color:var(--muted2);padding:5px 12px;border-radius:3px;cursor:pointer;transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:var(--bord2);color:var(--text)}
.fbtn.fa {border-color:var(--poly);  color:var(--poly);  background:rgba(0,194,255,.07)}
.fbtn.fg {border-color:var(--green); color:var(--green); background:rgba(34,197,94,.07)}
.vsep{width:1px;height:18px;background:var(--border);margin:0 3px}
.upd-r{font-family:var(--mono);font-size:9px;color:var(--muted);margin-left:auto;white-space:nowrap}
.upd-n{color:var(--poly)}
.sort-sel{font-family:var(--mono);font-size:10px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:3px;cursor:pointer;outline:none}

/* ── MAIN ── */
main{max-width:1440px;margin:0 auto;padding:20px 28px 80px}
.screen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 0;gap:14px}
.spinner{width:30px;height:30px;border:2px solid var(--bord2);border-top-color:var(--poly);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.scr-txt{font-family:var(--mono);font-size:10px;color:var(--muted2);text-transform:uppercase;letter-spacing:2px;text-align:center}
.retry-btn{font-family:var(--mono);font-size:11px;background:transparent;border:1px solid var(--poly);color:var(--poly);padding:7px 18px;border-radius:3px;cursor:pointer;margin-top:6px}

/* ── TABLE HEADER ── */
.thead{display:grid;grid-template-columns:1fr 160px 160px 160px 120px;gap:6px;padding:7px 16px;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);border-bottom:1px solid var(--border);margin-bottom:3px}

/* ── CARD ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:5px;margin-bottom:7px;overflow:hidden;cursor:pointer;transition:border-color .2s;animation:fi .25s ease both}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.card:hover{border-color:var(--bord2)}
.card.arb {border-left:3px solid var(--green)}
.card.arb:hover{border-color:rgba(34,197,94,.4)}
.card.diff{border-left:3px solid var(--yellow)}
.card.diff:hover{border-color:rgba(245,158,11,.4)}

/* main row */
.crow{display:grid;grid-template-columns:1fr 160px 160px 160px 120px;gap:6px;padding:13px 16px;align-items:center}

/* event title */
.etitle{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:4px}
.emeta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px}
.cat-tag{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:1px;padding:1px 7px;border-radius:2px;background:rgba(255,255,255,.05);color:var(--muted2);border:1px solid var(--border)}
/* ── GROUP CARD ── */
.group-card { cursor: default; }
.group-head { display:flex; justify-content:space-between; align-items:flex-start; padding:13px 16px; cursor:pointer; gap:12px; }
.group-badge { flex-shrink:0; }
.group-table-wrap { overflow-x:auto; border-top:1px solid var(--border); }
.group-table { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12px; }
.group-table thead tr { background:rgba(0,0,0,.2); }
.group-table th { padding:7px 12px; text-align:left; font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:600; white-space:nowrap; }
.group-table .crow { border-top:1px solid var(--border); transition:background .15s; }
.group-table .crow:hover { background:rgba(255,255,255,.03); }
.group-table .crow-arb  { background:rgba(34,197,94,.04); }
.group-table .crow-diff { background:rgba(245,158,11,.03); }
.group-table td { padding:9px 12px; vertical-align:middle; }
.ct-name { font-weight:600; font-size:13px; font-family:var(--sans); color:var(--text); max-width:200px; }
.ct-poly  { color:var(--poly); font-weight:700; font-size:13px; }
.ct-kal   { color:var(--kalshi); font-weight:700; font-size:13px; }
.ct-nd    { color:var(--muted); font-size:12px; }
.ct-poly small, .ct-kal small { font-size:10px; color:var(--muted2); margin-left:3px; font-weight:400; }
.cd-arb   { color:var(--green);  font-weight:700; font-size:11px; }
.cd-diff  { font-weight:600; font-size:11px; }
.cd-pos   { color:var(--poly); }
.cd-neg   { color:var(--kalshi); }
.cd-same  { color:var(--muted); }
.ct-action { font-size:10px; }
.arb-action a { color:var(--green); text-decoration:none; font-weight:600; padding:2px 6px; border:1px solid rgba(34,197,94,.3); border-radius:2px; margin:0 2px; }
.arb-action a:hover { background:rgba(34,197,94,.1); }
.book-rows{max-height:280px;overflow-y:auto}
.db-sub-hdr{display:flex;gap:6px;padding:3px 4px;font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);margin-bottom:3px}
.db-sub-hdr span:first-child{flex:1}
.book-bet-link{font-size:9px;font-family:var(--mono);color:var(--green);text-decoration:none;border:1px solid rgba(34,197,94,.3);padding:1px 5px;border-radius:2px;white-space:nowrap;margin-left:4px}
.book-bet-link:hover{background:rgba(34,197,94,.1)}
.book-row:hover{background:rgba(255,255,255,.04)}
.book-name{flex:1;color:var(--muted2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100px;font-family:var(--sans);font-size:10px}
.book-odds{color:var(--book);font-weight:700;min-width:32px;text-align:right}
.book-prob{color:var(--text);min-width:28px;text-align:right}
.qlink{font-family:var(--mono);font-size:9px;text-decoration:none;padding:1px 8px;border-radius:2px;border:1px solid;transition:opacity .15s;white-space:nowrap}
.qlink:hover{opacity:1 !important}
.qlink-poly{color:var(--poly);border-color:rgba(0,194,255,.25);opacity:.7}
.qlink-kal {color:var(--kalshi);border-color:rgba(155,108,255,.25);opacity:.7}

/* price cell — always shows YES% and NO% */
.pc{display:flex;flex-direction:column;gap:0}
.pc-src{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:3px}
.pc.poly   .pc-src{color:var(--poly)}
.pc.kalshi .pc-src{color:var(--kalshi)}
.pc.book   .pc-src{color:var(--book)}

/* YES row */
.pc-yes{display:flex;align-items:baseline;gap:5px;margin-bottom:2px}
.pc-yes-lbl{font-family:var(--mono);font-size:8px;font-weight:600;color:var(--green);text-transform:uppercase;min-width:22px}
.pc-yes-val{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1;color:var(--text)}
.pc.poly   .pc-yes-val{color:var(--poly)}
.pc.kalshi .pc-yes-val{color:var(--kalshi)}
/* price cell rows */
.pc-row{display:flex;align-items:baseline;gap:5px;margin-bottom:3px}
.pc-outcome-name{font-family:var(--sans);font-size:11px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pc-val-main{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1;flex-shrink:0}
.pc.poly   .pc-val-main{color:var(--poly)}
.pc.kalshi .pc-val-main{color:var(--kalshi)}
.pc-val-sub{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--muted2);flex-shrink:0}
.pc-odds-small{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0}
/* action links in group table */
.act-link{display:inline-block;font-family:var(--mono);font-size:10px;text-decoration:none;padding:2px 7px;border-radius:2px;border:1px solid;white-space:nowrap;margin:1px 2px}
.act-link:hover{opacity:1}
.act-poly{color:var(--poly);border-color:rgba(0,194,255,.3);opacity:.8}
.act-kal {color:var(--kalshi);border-color:rgba(155,108,255,.3);opacity:.8}

/* NO row */
.pc-no{display:flex;align-items:baseline;gap:5px}
.pc-no-lbl{font-family:var(--mono);font-size:8px;font-weight:600;color:var(--red);text-transform:uppercase;min-width:22px}
.pc-no-val{font-family:var(--mono);font-size:12px;line-height:1;color:var(--muted2)}

/* no data */
.pc-nd{font-family:var(--mono);font-size:10px;color:var(--muted);font-style:italic;margin-top:6px}

/* spread cell */
.sc{display:flex;flex-direction:column;gap:3px;align-items:flex-start}
.stag{font-family:var(--mono);font-size:11px;font-weight:700;padding:3px 8px;border-radius:3px}
.st-arb {background:rgba(34,197,94,.12); color:var(--green); border:1px solid rgba(34,197,94,.25)}
.st-diff{background:rgba(245,158,11,.1); color:var(--yellow);border:1px solid rgba(245,158,11,.25)}
.st-book{background:rgba(251,191,36,.1); color:#fbbf24;     border:1px solid rgba(251,191,36,.3)}
.st-none{background:rgba(255,255,255,.04);color:var(--muted); border:1px solid var(--border)}
.explain.bookdiff{background:rgba(251,191,36,.07);border-left:3px solid #fbbf24;padding:10px 14px;border-radius:4px;font-size:13px;line-height:1.6;margin-bottom:10px}
.ssub{font-family:var(--mono);font-size:8px;color:var(--muted)}

/* ── DETAIL (expanded) ── */
.detail{border-top:1px solid var(--border);background:var(--card2);padding:16px 18px;display:none}
.detail.open{display:block}
.dboxes{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px;margin-bottom:14px}
.db{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:12px 14px}
.db.poly-b  {border-color:rgba(0,194,255,.2); background:rgba(0,194,255,.04)}
.db.kal-b   {border-color:rgba(155,108,255,.2);background:rgba(155,108,255,.04)}
.db.arb-b   {border-color:rgba(34,197,94,.25); background:rgba(34,197,94,.06)}
.db-lbl{font-family:var(--mono);font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:8px}
.db.poly-b .db-lbl  {color:var(--poly)}
.db.kal-b  .db-lbl  {color:var(--kalshi)}
.db.arb-b  .db-lbl  {color:var(--green)}
.db-yn{display:flex;gap:16px}
.db-side{display:flex;flex-direction:column;gap:2px}
.db-side-lbl{font-family:var(--mono);font-size:9px;font-weight:700;text-transform:uppercase}
.db-side-lbl.yes{color:var(--green)}
.db-side-lbl.no {color:var(--red)}
.db-side-val{font-family:var(--mono);font-size:20px;font-weight:700}
.db-side-odds{font-family:var(--mono);font-size:11px;color:var(--muted2)}
.db-nd{font-family:var(--mono);font-size:12px;color:var(--muted);font-style:italic}

.explain{padding:11px 14px;border-radius:4px;font-size:13px;line-height:1.7;border:1px solid;margin-bottom:14px}
.explain.arb {background:rgba(34,197,94,.06);border-color:rgba(34,197,94,.2);color:#86efac}
.explain.diff{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.2);color:#fcd34d}
.explain strong{font-weight:700}

.dlinks{display:flex;gap:10px;flex-wrap:wrap}
.dlink{font-family:var(--mono);font-size:9px;text-decoration:none;padding:5px 12px;border-radius:3px;border:1px solid;opacity:.7;transition:opacity .2s;text-transform:uppercase;letter-spacing:1px}
.dlink:hover{opacity:1}
.dlink.poly  {color:var(--poly);  border-color:rgba(0,194,255,.3)}
.dlink.kalshi{color:var(--kalshi);border-color:rgba(155,108,255,.3)}

.empty{text-align:center;padding:60px 0;font-family:var(--mono);font-size:12px;color:var(--muted);line-height:2}

/* ── TOAST ── */
#toast{position:fixed;bottom:22px;right:22px;z-index:9999;font-family:var(--mono);font-size:11px;padding:9px 16px;border-radius:3px;background:var(--card2);border:1px solid var(--bord2);color:var(--text);transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok {border-color:var(--green);color:var(--green)}
#toast.err{border-color:var(--red);  color:var(--red)}

@media(max-width:900px){
  .thead{display:none}
  .crow{grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto}
  .e-info{grid-column:1/-1}
  .hstats{display:none}
  header{padding:0 14px}
  main,.fbar,.sbar{padding-left:14px;padding-right:14px}
}
</style>
</head>
<body>
<div id="toast"></div>

<header>
  <div class="logo">Poly<span>Edge</span><small>Арбитраж маркетов</small></div>
  <div class="hstats">
    <div class="hs"><div class="hs-v" id="hTotal">—</div><div class="hs-l">Событий</div></div>
    <div class="hs"><div class="hs-v" id="hArb" style="color:var(--green)">—</div><div class="hs-l">Арбитраж</div></div>
    <div class="hs"><div class="hs-v" id="hDiff" style="color:var(--yellow)">—</div><div class="hs-l">Расхождение</div></div>
    <div class="hs"><div class="hs-v" id="hKal">—</div><div class="hs-l">Kalshi матчей</div></div>
    <div class="hs"><div class="hs-v" id="hBook" style="color:var(--book)">—</div><div class="hs-l">vs Букмекеры</div></div>
  </div>
  <div class="hright">
    <div class="live"><div class="live-dot"></div>Live</div>
    <button class="rbtn" onclick="manualRefresh()">↻ Обновить</button>
    <button class="rbtn" onclick="openDebug()" title="Проверить Kalshi API">🔧</button>
  </div>
</header>

<div class="sbar">
  <div class="src s-wait" id="srcPoly">  <div class="sd" style="background:var(--yellow)"></div>Polymarket: загрузка...</div>
  <div class="src s-wait" id="srcKalshi"><div class="sd" style="background:var(--yellow)"></div>Kalshi: загрузка...</div>
  <div class="src s-wait" id="srcBook">  <div class="sd" style="background:var(--yellow)"></div>Букмекеры: нет данных</div>
  <div class="src s-wait" id="srcAI">   <div class="sd" style="background:var(--yellow)"></div>Матчинг: загрузка...</div>
</div>

<div class="fbar">
  <button class="fbtn fa"  onclick="setF('all',this)">Все события</button>
  <button class="fbtn fg"  onclick="setF('arb',this)">🟢 Арбитраж</button>
  <button class="fbtn"     onclick="setF('diff',this)">🟡 Расхождение</button>
  <button class="fbtn"     onclick="setF('bookdiff',this)">📊 vs Букмекеры</button>
  <div class="vsep"></div>
  <button class="fbtn" onclick="setF('Politics',this)">Политика</button>
  <button class="fbtn" onclick="setF('Sports',this)">Спорт</button>
  <button class="fbtn" onclick="setF('Crypto',this)">Крипто</button>
  <button class="fbtn" onclick="setF('Economics',this)">Экономика</button>
  <div class="vsep"></div>
  <select class="sort-sel" onchange="setSort(this.value)">
    <option value="arb">По ROI</option>
    <option value="diff">По расхождению</option>
    <option value="vol">По объёму</option>
  </select>
  <span class="upd-r" id="updR">— · обновление: <span class="upd-n" id="updN">—</span></span>
</div>

<main>
  <div id="scrLoad" class="screen"><div class="spinner"></div><div class="scr-txt" id="loadTxt">Загрузка...</div></div>
  <div id="scrErr"  class="screen" style="display:none">
    <div style="font-size:32px">⚠️</div>
    <div class="scr-txt" id="errTxt">Ошибка</div>
    <button class="retry-btn" onclick="loadAll()">Повторить</button>
  </div>
  <div id="app" style="display:none">
    <div class="thead">
      <div>Событие</div>
      <div>Polymarket</div>
      <div>Kalshi</div>
      <div>Ср. букмекеры</div>
      <div>Расхождение</div>
    </div>
    <div id="list"></div>
  </div>
</main>

<script>
// ════════════════════════════════
// CONFIG
// ════════════════════════════════
const REFRESH_SEC = 90; // auto-refresh every 90 seconds

// ════════════════════════════════
// STATE
// ════════════════════════════════
let events = [], kalMap = {}, bookMap = {}, filter = 'all', sortBy = 'arb';
let openId = null, refreshTimer = null, countdown = REFRESH_SEC;

// ════════════════════════════════
// INIT
// ════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadAll();
  startCountdown();
});

// ════════════════════════════════
// LOAD — parallel fetch of all sources
// ════════════════════════════════
async function loadAll() {
  showScr('load');
  setText('loadTxt', 'Загрузка данных...');

  // Fetch all 3 sources in parallel
  const [polyRes, kalRes, oddsRes] = await Promise.allSettled([
    fetchPoly(),
    fetchKalshi(),
    fetchOdds(),
  ]);

  // ── Polymarket ────────────────────────────────────────────
  let poly = [];
  if (polyRes.status === 'fulfilled' && polyRes.value?.length) {
    poly = polyRes.value;
    setSrc('srcPoly', 'ok', `Polymarket: ${poly.length} маркетов ✓`);
  } else {
    setSrc('srcPoly', 'err', `Polymarket: ${polyRes.reason?.message || 'ошибка'}`);
    setText('errTxt', 'Не удалось загрузить Polymarket. Обновите страницу.');
    showScr('err'); return;
  }

  // ── Kalshi ───────────────────────────────────────────────
  kalMap = {};
  if (kalRes.status === 'fulfilled' && kalRes.value?.length) {
    kalRes.value.forEach(km => {
      kalMap[norm(km.title)] = km;
      if (km.ticker) kalMap[km.ticker.toLowerCase()] = km;
    });
    setSrc('srcKalshi', 'ok', `Kalshi: ${kalRes.value.length} маркетов ✓`);
  } else {
    setSrc('srcKalshi', 'wait', 'Kalshi: нет данных');
  }

  // ── Bookmakers ────────────────────────────────────────────
  bookMap = {};
  if (oddsRes.status === 'fulfilled') {
    const j = oddsRes.value;
    if (j.ok && j.markets?.length) {
      j.markets.forEach(bm => {
        bookMap[norm(bm.title)] = bm;
        bookMap[norm(bm.home_team)] = bm;
      });
      setSrc('srcBook', 'ok', `Букмекеры: ${j.markets.length} событий · ${getMaxBookCount(j.markets)} контор ✓`);
    } else if (j.error === 'NO_KEY') {
      setSrc('srcBook', 'wait', '📋 Букмекеры: нужен ключ → the-odds-api.com (бесплатно)');
    } else {
      setSrc('srcBook', 'wait', `Букмекеры: ${j.message || 'нет данных'}`);
    }
  } else {
    setSrc('srcBook', 'wait', 'Букмекеры: ошибка загрузки');
  }

  // ── Build & render ────────────────────────────────────────
  events = buildGroupedEvents(poly);
  const kalMatched = events.filter(e => e.candidates?.some(c => c.kal) || e.kal).length;
  setSrc('srcAI', 'ok', `Матчинг: ${kalMatched} событий с Kalshi ✓`);
  render();
  showScr('app');

  const t = new Date().toLocaleTimeString('ru-RU');
  setText('updR', `Обновлено ${t} · след. через `);
  countdown = REFRESH_SEC;
  toast(`✓ ${events.length} событий · ${kalMatched} на Kalshi`, 'ok');
}

function getMaxBookCount(markets) {
  return Math.max(...markets.map(m => Object.keys(m.bookmakers || {}).length), 0);
}

// ── Fetchers ──────────────────────────────────────────────────────────────────
async function fetchPoly() {
  const r = await fetch('/api/markets', { signal: AbortSignal.timeout(12000) });
  const j = await r.json();
  if (!j.ok || !j.markets?.length) throw new Error(j.error || 'empty');
  return j.markets;
}

async function fetchKalshi() {
  const r = await fetch('/api/kalshi', { signal: AbortSignal.timeout(15000) });
  const j = await r.json();
  if (!j.ok || !j.markets?.length) throw new Error(j.error || 'empty');
  return j.markets;
}

async function fetchOdds() {
  const r = await fetch('/api/odds', { signal: AbortSignal.timeout(12000) });
  return await r.json();
}

// ── Auto-refresh countdown ────────────────────────────────────────────────────
function startCountdown() {
  if (refreshTimer) clearInterval(refreshTimer);
  countdown = REFRESH_SEC;
  refreshTimer = setInterval(() => {
    countdown--;
    const el = $('updN');
    if (el) el.textContent = countdown + 'с';
    if (countdown <= 0) {
      countdown = REFRESH_SEC;
      silentRefresh();
    }
  }, 1000);
}

async function silentRefresh() {
  try {
    const [polyRes, kalRes, oddsRes] = await Promise.allSettled([
      fetchPoly(), fetchKalshi(), fetchOdds(),
    ]);

    let changed = false;

    if (polyRes.status === 'fulfilled' && polyRes.value?.length) {
      // Update kalMap first
      if (kalRes.status === 'fulfilled' && kalRes.value?.length) {
        kalMap = {};
        kalRes.value.forEach(km => {
          kalMap[norm(km.title)] = km;
          if (km.ticker) kalMap[km.ticker.toLowerCase()] = km;
        });
        setSrc('srcKalshi', 'ok', `Kalshi: ${kalRes.value.length} маркетов ✓`);
      }

      if (oddsRes.status === 'fulfilled' && oddsRes.value?.ok) {
        const j = oddsRes.value;
        bookMap = {};
        j.markets?.forEach(bm => {
          bookMap[norm(bm.title)] = bm;
          bookMap[norm(bm.home_team)] = bm;
        });
      }

      events = buildGroupedEvents(polyRes.value);
      changed = true;
    }

    if (changed) {
      render();
      setText('updR', `Обновлено ${new Date().toLocaleTimeString('ru-RU')} · след. через `);
    }
  } catch(e) {
    console.warn('Silent refresh failed:', e.message);
  }
}

function manualRefresh() { loadAll(); startCountdown(); }



// ════════════════════════════════
// GROUP EVENTS
// Groups Polymarket markets by eventSlug, finds Kalshi matches for each candidate
// ════════════════════════════════
function buildGroupedEvents(polyMarkets) {
  // Group by eventSlug
  const groups = {};
  for (const m of polyMarkets) {
    const key = m.eventSlug || m.id;
    if (!groups[key]) groups[key] = { slug: key, title: m.eventTitle || m.question, markets: [], eventUrl: m.eventUrl || m.url };
    groups[key].markets.push(m);
  }

  const result = [];

  for (const grp of Object.values(groups)) {
    const mList = grp.markets;

    // Single market event → use regular buildEv
    if (mList.length === 1) {
      const ev = buildEv(mList[0]);
      if (ev) result.push(ev);
      continue;
    }

    // Multi-market event (multiple candidates) → build grouped card
    const candidates = mList
      .map(m => {
        if (!m.yesProb || m.yesProb < 0.005) return null;
        const py = m.yesProb;
        const pn = 1 - py;

        // For multi-candidate events, the candidate name is in outcomes[0]
        // e.g. "Gavin Newsom" — use this to search Kalshi, not the full question
        const candidateName = m.outcomes?.[0] || '';
        const searchQuery   = candidateName.length > 3 ? candidateName : m.question;

        // Try candidate name first, then full question
        let km = findKalshi(searchQuery, py);
        if (!km && searchQuery !== m.question) km = findKalshi(m.question, py);

        const ky = km?.yesProb ?? null;
        const kn = ky != null ? 1 - ky : null;

        // Arbitrage calc per candidate
        let arb = null;
        if (ky != null) {
          const costA = py + kn, costB = pn + ky;
          const roiA = costA < 1 ? ((1-costA)/costA)*100 : 0;
          const roiB = costB < 1 ? ((1-costB)/costB)*100 : 0;
          const validA = costA < 0.985 && roiA >= 0.3 && roiA <= 20;
          const validB = costB < 0.985 && roiB >= 0.3 && roiB <= 20;
          if (validA || validB) {
            const useA = validA && (!validB || costA <= costB);
            const cost = useA ? costA : costB;
            arb = {
              type: 'arb', cost, profit: 1-cost, roi: ((1-cost)/cost)*100,
              polyBuy:     useA ? 'YES' : 'NO',
              kalBuy:      useA ? 'NO'  : 'YES',
              polyPrice:   useA ? py   : pn,
              kalPrice:    useA ? kn   : ky,
              polyOutcome: m.outcomes?.[0]||'Yes',
              kalOutcome:  useA ? (km.no_sub_title||m.outcomes?.[1]||'No') : (km.yes_sub_title||m.outcomes?.[0]||'Yes'),
            };
          } else {
            const diff = Math.abs(py - ky);
            if (diff >= 0.01) arb = { type:'diff', diff, higher: py>ky?'Poly':'Kalshi', lower: py>ky?'Kalshi':'Poly' };
          }
        }

        return {
          id:       m.id,
          name:     candidateName || m.outcomes?.[0] || m.question,
          question: m.question,
          url:      m.url,
          py, pn, ky, kn,
          kal: km,
          arb,
          vol: m.volume || 0,
        };
      })
      .filter(Boolean)
      .sort((a,b) => b.py - a.py); // sort by Poly probability desc

    if (!candidates.length) continue;

    // Max arb across all candidates
    const maxArb = candidates.reduce((best, c) => {
      if (!c.arb) return best;
      if (!best) return c.arb;
      const cVal = c.arb.type==='arb' ? c.arb.roi : (c.arb.type==='diff' ? c.arb.diff*100 : 0);
      const bVal = best.type==='arb' ? best.roi : (best.type==='diff' ? best.diff*100 : 0);
      return cVal > bVal ? c.arb : best;
    }, null);

    const hasAnyKalshi = candidates.some(c => c.kal);
    const totalVol = candidates.reduce((s,c) => s+c.vol, 0);
    const tags = mList[0]?.tags || [];

    result.push({
      id:         grp.slug,
      isGroup:    true,              // ← flag for renderer
      q:          grp.title,
      candidates,
      arb:        maxArb,
      kal:        hasAnyKalshi ? {} : null,
      cat:        guessCat(grp.title, tags),
      vol:        totalVol,
      volS:       fmtVol(totalVol),
      end:        mList[0]?.endDate ? new Date(mList[0].endDate).toLocaleDateString('ru-RU',{day:'numeric',month:'short'}) : '—',
      url:        grp.eventUrl,
      kalEventUrl: hasAnyKalshi ? kalshiEventUrl(candidates) : null,
      // for compat with single-event render
      py: candidates[0]?.py, pn: candidates[0]?.pn,
      ky: candidates[0]?.ky, kn: candidates[0]?.kn,
      yL: 'Да', nL: 'Нет',
    });
  }

  return result.filter(Boolean);
}

// Get Kalshi event URL from first matched candidate
function kalshiEventUrl(candidates) {
  for (const c of candidates) {
    if (c.kal?.url) return c.kal.url;
  }
  return null;
}

// ════════════════════════════════
// BUILD EVENT (single market)
// ════════════════════════════════
function buildEv(m) {
  const p = m.yesProb;
  if (!p || p < 0.02 || p > 0.98) return null;

  const km = findKalshi(m.question, p);
  const bm = findBook(m.question);
  const bookAvg = bm?.yesProb ?? null;

  const py = p;
  const pn = 1 - p;
  const ky = km?.yesProb ?? null;
  const kn = ky != null ? 1 - ky : null;

  // ── Kalshi arbitrage ─────────────────────────────────────────────────────────
  let arb = null;
  if (ky != null) {
    const costA = py + kn;
    const costB = pn + ky;
    const priceDiff = Math.abs(py - ky);

    if (priceDiff <= 0.40) {
      const roiA = costA < 1 ? ((1-costA)/costA)*100 : 0;
      const roiB = costB < 1 ? ((1-costB)/costB)*100 : 0;
      const validA = costA < 0.985 && roiA >= 0.5 && roiA <= 20;
      const validB = costB < 0.985 && roiB >= 0.5 && roiB <= 20;

      if (validA || validB) {
        const useA = validA && (!validB || costA <= costB);
        const cost = useA ? costA : costB;
        arb = {
          type: 'arb', cost, profit: 1-cost, roi: ((1-cost)/cost)*100,
          source: 'kalshi',
          polyBuy:     useA ? 'YES' : 'NO',
          polyPrice:   useA ? py   : pn,
          polyOutcome: useA ? (m.outcomes?.[0]||'Yes') : (m.outcomes?.[1]||'No'),
          kalBuy:      useA ? 'NO'  : 'YES',
          kalPrice:    useA ? kn   : ky,
          kalOutcome:  useA ? (km.no_sub_title||m.outcomes?.[1]||'No') : (km.yes_sub_title||m.outcomes?.[0]||'Yes'),
        };
      } else {
        const diff = Math.abs(py - ky);
        if (diff >= 0.01) arb = { type:'diff', source:'kalshi', diff,
          higher: py>ky ? 'Polymarket' : 'Kalshi',
          lower:  py>ky ? 'Kalshi' : 'Polymarket' };
      }
    }
  }

  // ── Polymarket vs Bookmakers comparison ──────────────────────────────────────
  // If bookmaker avg differs from Polymarket by ≥1% → show divergence
  // Bookmakers don't offer binary prediction contracts so this isn't true arb,
  // but it shows where Polymarket is mispriced vs the betting market consensus.
  let bookDiff = null;
  if (bookAvg != null) {
    const diff = py - bookAvg; // positive = Poly higher than books
    if (Math.abs(diff) >= 0.01) {  // ≥1% threshold
      bookDiff = {
        diff:   Math.abs(diff),
        polyHigher: diff > 0,   // true = Poly overvalues YES, books are cheaper
        polyProb:   py,
        bookProb:   bookAvg,
        bookCount:  bm?.bookCount || 0,
        // Which side to buy: if Poly is higher, books give better odds on YES
        // if Poly is lower, Polymarket gives better odds on YES
        cheaperOn:  diff > 0 ? 'books' : 'polymarket',
        action:     diff > 0
          ? `YES дешевле у букмекеров (${Math.round(bookAvg*100)}% vs ${Math.round(py*100)}%)`
          : `YES дешевле на Polymarket (${Math.round(py*100)}% vs ${Math.round(bookAvg*100)}%)`,
      };
    }
  }

  // Prefer kalshi arb over book diff in arb slot, but show both
  // If no kalshi arb/diff, use bookDiff as the primary signal
  if (!arb && bookDiff) {
    arb = { type: 'bookdiff', ...bookDiff };
  }

  const yLabel = m.outcomes?.[0] || 'Yes';
  const nLabel = m.outcomes?.[1] || 'No';

  return {
    id: m.id, q: m.question,
    yL: yLabel, nL: nLabel,
    cat: guessCat(m.question, m.tags),
    py, pn, ky, kn, kal: km,
    bookAvg, bm, bookDiff,
    arb,
    vol: m.volume || 0, volS: fmtVol(m.volume || 0),
    end: m.endDate ? new Date(m.endDate).toLocaleDateString('ru-RU',{day:'numeric',month:'short'}) : '—',
    url: m.url || (m.eventSlug && m.slug
      ? `https://polymarket.com/event/${m.eventSlug}/${m.slug}`
      : m.eventSlug ? `https://polymarket.com/event/${m.eventSlug}`
      : `https://polymarket.com/market/${m.slug||''}`),
  };
}

// Kalshi URL — берём готовый из API, или строим по series/event_ticker
function kalshiUrl(km) {
  if (!km) return null;
  // API уже строит правильный URL в kalshi.js
  if (km.url && km.url !== 'https://kalshi.com') return km.url;
  // Строим вручную: /markets/{series}/{event_ticker}
  const et = (km.event_ticker || km.ticker || '').toLowerCase();
  const st = (km.series_ticker || et.split('-')[0] || '').toLowerCase();
  if (st && et && st !== et) return `https://kalshi.com/markets/${st}/${et}`;
  if (et) return `https://kalshi.com/markets/${et}`;
  return 'https://kalshi.com';
}
// ════════════════════════════════════════════════════════════════
// RULE-AWARE KALSHI MATCHER
// ════════════════════════════════════════════════════════════════
function norm(t){ return (t||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim(); }
function isNumericThreshold(km) {
  const t=(km.title||'')+' '+(km.yes_sub_title||'')+' '+(km.no_sub_title||'');
  return /\b(above|below|over|under|at least|more than|fewer|higher|lower|between|\d+\s*%|\d+\s*seats|\d+\s*points|\d+\s*degrees?)\b/i.test(t);
}

const STOP_EXT = new Set([
  'will','the','a','an','in','on','at','to','of','for','be','is','are','was',
  'by','or','and','that','this','with','have','not','its','per','win','wins',
  'most','next','more','than','over','under','least','first','been','from',
  'which','what','who','how','when','where','does','did','has','had','would',
  'could','should','may','might','shall','being','their','they','them','into',
  'after','before','during','about','between','among','each','every','any',
  'all','both','either','neither','whether','while','since','until','within',
]);
function kws(t){ return norm(t).split(' ').filter(w=>w.length>2&&!STOP_EXT.has(w)); }

function extractNums(t) {
  return ((t||'').match(/\b\d+(?:\.\d+)?\b/g)||[]).map(Number);
}

function hasThresholdConflict(textA, textB) {
  const na = extractNums(textA), nb = extractNums(textB);
  if (!na.length || !nb.length) return false;
  for (const a of na) for (const b of nb) {
    if (Math.abs(a-b)/Math.max(a,b,1) < 0.05) return false;
  }
  return true;
}

const RESOLUTION_CONFLICTS = [
  ['nominat','confirm'], ['appoint','confirm'], ['nominat','elect'],
  ['primary','general'], ['popular','electoral'], ['senate','house'],
];
function hasResolutionConflict(textA, textB) {
  const a=(textA||'').toLowerCase(), b=(textB||'').toLowerCase();
  for (const [w1,w2] of RESOLUTION_CONFLICTS) {
    if ((a.includes(w1)&&!a.includes(w2))&&(!b.includes(w1)&&b.includes(w2))) return `"${w1}" vs "${w2}"`;
    if ((!a.includes(w1)&&a.includes(w2))&&(b.includes(w1)&&!b.includes(w2))) return `"${w2}" vs "${w1}"`;
  }
  return null;
}

const SOURCE_SYNONYMS = {
  'nws':'oHare','national weather service':'oHare','wunderground':'oHare',
  'kord':'oHare','ohare':'oHare',"o'hare":'oHare',
  'midway':'midway','senate':'senate','congress':'senate',
};
function normalizeSource(text) {
  const t=(text||'').toLowerCase();
  for (const [alias,canon] of Object.entries(SOURCE_SYNONYMS)) if(t.includes(alias)) return canon;
  return null;
}

function extractPeriod(t) {
  const text=(t||'').toLowerCase();
  const year=text.match(/\b(202[0-9])\b/)?.[1];
  const quarter=text.match(/\bq([1-4])\b/i)?.[1];
  const months=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
  const month=months.findIndex(m=>text.includes(m));
  return {year,quarter,month:month>=0?month:null};
}
function hasPeriodConflict(titleA, titleB) {
  const pA=extractPeriod(titleA), pB=extractPeriod(titleB);
  if (pA.year&&pB.year&&pA.year!==pB.year) return `год: ${pA.year} vs ${pB.year}`;
  if (pA.quarter&&pB.quarter&&pA.quarter!==pB.quarter) return `Q${pA.quarter} vs Q${pB.quarter}`;
  if (pA.month!==null&&pB.month!==null&&pA.month!==pB.month) return `месяц ${pA.month+1} vs ${pB.month+1}`;
  return null;
}

function jaccard(setA, setB) {
  if (!setA.length&&!setB.length) return 1;
  if (!setA.length||!setB.length) return 0;
  const a=new Set(setA), b=new Set(setB);
  const inter=[...a].filter(x=>b.has(x)).length;
  return inter/(a.size+b.size-inter);
}

// ── Определяем лигу/вид спорта из текста ──────────────────────────────────
const SPORT_LEAGUES = {
  nba:      ['nba','basketball','rockets','lakers','celtics','warriors','bulls','heat','nets','knicks','bucks','sixers','clippers','nuggets','suns','jazz','spurs','thunder','trail blazers','blazers','grizzlies','pelicans','timberwolves','wizards','magic','cavaliers','pistons','pacers','raptors','hawks','hornets','conference finals','conference semi'],
  nfl:      ['nfl','football','super bowl','chiefs','patriots','bills','cowboys','49ers','packers','bears','ravens','steelers','seahawks','rams','chargers','broncos','dolphins','bengals','browns','titans','colts','jaguars','texans','raiders','falcons','saints','panthers','buccaneers','vikings','giants','eagles','commanders','cardinals'],
  mlb:      ['mlb','baseball','world series','yankees','dodgers','red sox','cubs','mets','astros','braves','giants','cardinals','phillies','padres','brewers','reds','pirates','mariners','athletics','rangers','tigers','white sox','indians','guardians','royals','twins','orioles','blue jays','rays'],
  nhl:      ['nhl','hockey','stanley cup','penguins','blackhawks','bruins','maple leafs','rangers','canadiens','red wings','flyers','capitals','blues','golden knights','avalanche','oilers','flames','canucks','senators','sabres','coyotes','ducks','kings','sharks','stars','wild','jets','predators','hurricanes','lightning','panthers','devils','islanders'],
  soccer:   ['soccer','football','premier league','la liga','bundesliga','serie a','ligue 1','champions league','mls','world cup','euro','copa america','fa cup','bundesliga'],
  tennis:   ['tennis','atp','wta','grand slam','wimbledon','us open','french open','australian open','roland garros'],
  mma:      ['ufc','mma','bellator','one championship'],
  golf:     ['golf','pga','masters','us open','british open','ryder cup','lpga'],
  f1:       ['formula 1','f1','grand prix','ferrari','mercedes','red bull racing'],
};

function detectSport(text) {
  const t = (text||'').toLowerCase();
  for (const [sport, keywords] of Object.entries(SPORT_LEAGUES)) {
    if (keywords.some(k => t.includes(k))) return sport;
  }
  return null;
}

// ── Конфликт вида спорта/лиги ─────────────────────────────────────────────
function hasSportConflict(textA, textB) {
  const sA = detectSport(textA);
  const sB = detectSport(textB);
  // If both have detected sports and they differ → conflict
  if (sA && sB && sA !== sB) return `sport: ${sA} vs ${sB}`;
  return null;
}

function findKalshi(q, polyYesProb) {
  if (!q) return null;
  const exact = kalMap[norm(q)];
  if (exact) return validateKalshiMatch(exact, polyYesProb, q);

  const qKws = kws(q);

  // Special case: short query (1-2 words = candidate name like "Gavin Newsom")
  if (qKws.length < 2) {
    const qNorm = norm(q);
    // For short names, also check sport context via the parent question
    let bestShort = null, bestShortScore = 0;
    for (const km of Object.values(kalMap)) {
      if (!km.title) continue;
      if (isNumericThreshold(km)) continue;
      const kNorm = norm(km.title);
      if (kNorm.includes(qNorm) || qNorm.includes(kNorm)) {
        const score = qNorm.length / Math.max(qNorm.length, kNorm.length);
        if (score > bestShortScore) { bestShort = km; bestShortScore = score; }
      }
    }
    return bestShort ? validateKalshiMatch(bestShort, polyYesProb, q) : null;
  }

  let best=null, bestScore=0;

  for (const km of Object.values(kalMap)) {
    if (!km.title) continue;
    if (isNumericThreshold(km)) continue;
    if (hasPeriodConflict(q, km.title)) continue;
    if (hasResolutionConflict(q+' '+(km.yes_sub_title||''), km.title+' '+(km.yes_sub_title||'')+' '+(km.no_sub_title||''))) continue;

    const kalFull = [km.title, km.yes_sub_title||'', km.no_sub_title||''].join(' ');
    if (hasThresholdConflict(q, kalFull)) continue;

    const srcA=normalizeSource(q), srcB=normalizeSource(kalFull);
    if (srcA&&srcB&&srcA!==srcB) continue;

    // ── NEW: reject if different sport/league ──────────────────────────────
    if (hasSportConflict(q, kalFull)) continue;

    const titleScore = jaccard(qKws, kws(km.title));
    const fullScore  = jaccard(qKws, kws(kalFull));
    const exactHits  = qKws.filter(w => kws(km.title).includes(w)).length;
    const score      = titleScore*0.6 + fullScore*0.4;

    if (exactHits>=2 && score>=0.35 && score>bestScore) {
      best=km; bestScore=score;
    }
  }

  return best ? validateKalshiMatch(best, polyYesProb, q) : null;
}

function validateKalshiMatch(km, polyYesProb, polyQ) {
  if (polyYesProb==null||km.yesProb==null) return km;
  if (Math.abs(polyYesProb-km.yesProb)>0.40) return null;
  if (polyQ && hasResolutionConflict(polyQ, km.title)) return null;
  // Also check sport conflict on full match
  if (polyQ) {
    const kalFull = [km.title, km.yes_sub_title||'', km.no_sub_title||''].join(' ');
    if (hasSportConflict(polyQ, kalFull)) return null;
  }
  return km;
}

// Find bookmaker market matching Polymarket question
// Bookmaker titles are like "Houston Rockets vs Golden State Warriors"
function findBook(q) {
  if (!q || !Object.keys(bookMap).length) return null;

  const exact = bookMap[norm(q)];
  if (exact) return exact;

  const qk = kws(q);
  if (qk.length < 1) return null;

  let best = null, bs = 0;
  for (const bm of Object.values(bookMap)) {
    if (!bm.title) continue;
    // Skip if different sport
    if (hasSportConflict(q, bm.title + ' ' + (bm.sport_key||''))) continue;

    const mk = kws(bm.title);
    // Also check home_team and away_team individually
    const homek = kws(bm.home_team || '');
    const awayk = kws(bm.away_team || '');
    const allk  = [...new Set([...mk, ...homek, ...awayk])];

    const hits  = qk.filter(w => allk.includes(w));
    const score = hits.length / Math.max(qk.length, mk.length);
    if (hits.length >= 1 && score >= 0.3 && score > bs) { best = bm; bs = score; }
  }
  return best;
}
function render() {
  let list = [...events];
  if      (filter==='arb')      list = list.filter(e=>e.arb?.type==='arb');
  else if (filter==='diff')     list = list.filter(e=>e.arb?.type==='diff'||e.arb?.type==='bookdiff');
  else if (filter==='bookdiff') list = list.filter(e=>e.arb?.type==='bookdiff');
  else if (filter!=='all')      list = list.filter(e=>e.cat===filter);

  if      (sortBy==='arb')  list.sort((a,b)=>(b.arb?.roi||b.arb?.diff||0)-(a.arb?.roi||a.arb?.diff||0));
  else if (sortBy==='diff') list.sort((a,b)=>(b.arb?.diff||b.arb?.roi||0)-(a.arb?.diff||a.arb?.roi||0));
  else                      list.sort((a,b)=>b.vol-a.vol);

  setText('hTotal', events.length);
  setText('hArb',   events.filter(e=>e.arb?.type==='arb').length);
  setText('hDiff',  events.filter(e=>e.arb?.type==='diff'||e.arb?.type==='bookdiff').length);
  setText('hKal',   events.filter(e=>e.kal||e.candidates?.some(c=>c.kal)).length);
  setText('hBook',  events.filter(e=>e.bookAvg!=null).length);

  const el = $('list');
  el.innerHTML = '';
  if (!list.length) {
    el.innerHTML='<div class="empty">Нет событий по фильтру.<br>Попробуй «Все события».</div>';
    return;
  }
  list.forEach((ev,i) => el.appendChild(makeCard(ev, i)));
}

function makeCard(ev, i) {
  // Route to group renderer for multi-candidate events
  if (ev.isGroup) return makeGroupCard(ev, i);

  const isArb  = ev.arb?.type==='arb';
  const isDiff = ev.arb?.type==='diff';

  const polyCell = priceCell('poly', 'Polymarket', ev.py, ev.pn, ev.yL, ev.nL);
  const kalCell  = ev.ky!=null
    ? priceCell('kalshi','Kalshi', ev.ky, ev.kn, ev.yL, ev.nL)
    : `<div class="pc kalshi"><div class="pc-src">Kalshi</div><div class="pc-nd">нет данных</div></div>`;
  const bookCell = ev.bookAvg != null
    ? priceCell('book', `Ср. ${ev.bm?.bookCount||''}букм.`, ev.bookAvg, 1 - ev.bookAvg, ev.yL, ev.nL)
    : `<div class="pc book"><div class="pc-src">Букмекеры</div><div class="pc-nd">нет ключа</div></div>`;

  let spread;
  if (isArb)
    spread = `<div class="sc"><div class="stag st-arb">+${ev.arb.roi.toFixed(1)}% ROI</div><div class="ssub">Арбитраж</div></div>`;
  else if (ev.arb?.type==='diff')
    spread = `<div class="sc"><div class="stag st-diff">↕ ${pct(ev.arb.diff)}</div><div class="ssub">vs Kalshi</div></div>`;
  else if (ev.arb?.type==='bookdiff')
    spread = `<div class="sc"><div class="stag st-book">📊 ${pct(ev.arb.diff)}</div><div class="ssub">${ev.arb.cheaperOn==='books'?'Poly завышен':'Poly дешевле'}</div></div>`;
  else
    spread = `<div class="sc"><div class="stag st-none">≈</div><div class="ssub">Согласуются</div></div>`;

  const card = document.createElement('div');
  card.className = `card${isArb?' arb':isDiff?' diff':''}`;
  card.style.animationDelay = Math.min(i*.025,.6)+'s';
  card.dataset.id = ev.id;
  card.innerHTML = `
    <div class="crow" onclick="toggleDet('${ev.id}')">
      <div class="e-info">
        <div class="etitle">${ev.q}</div>
        <div class="emeta">
          <span class="cat-tag">${ev.cat}</span>
          <span class="vol-tag">VOL: ${ev.volS} · до ${ev.end}</span>
          <a class="qlink qlink-poly" href="${ev.url}" target="_blank" onclick="event.stopPropagation()">↗ Polymarket</a>
          ${ev.kal ? `<a class="qlink qlink-kal" href="${kalshiUrl(ev.kal)}" target="_blank" onclick="event.stopPropagation()">↗ Kalshi</a>` : ''}
        </div>
      </div>
      ${polyCell}${kalCell}${bookCell}${spread}
    </div>
    <div class="detail" id="det-${ev.id}">${buildDetail(ev)}</div>`;
  return card;
}

function makeGroupCard(ev, i) {
  const isArb  = ev.arb?.type==='arb';
  const isDiff = ev.arb?.type==='diff';

  // Only show candidates that have Kalshi data AND divergence ≥1%
  const visibleCandidates = ev.candidates.filter(c => {
    if (!c.kal) return false; // no Kalshi data → skip
    const diff = Math.abs(c.py - c.ky);
    const hasArb = c.arb?.type === 'arb';
    return hasArb || diff >= 0.01; // show arb OR ≥1% diff
  });

  // If no candidates have divergence → render as simple card without table
  if (visibleCandidates.length === 0) {
    const topC = ev.candidates[0];
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = Math.min(i*.025,.6)+'s';
    card.dataset.id = ev.id;
    card.innerHTML = `
      <div class="crow" style="cursor:default">
        <div class="e-info" style="grid-column:1/-1">
          <div class="etitle">${ev.q}</div>
          <div class="emeta">
            <span class="cat-tag">${ev.cat}</span>
            <span class="vol-tag">VOL: ${ev.volS} · до ${ev.end} · ${ev.candidates.length} кандидатов</span>
            <a class="qlink qlink-poly" href="${ev.url}" target="_blank" onclick="event.stopPropagation()">↗ Polymarket</a>
            ${ev.kalEventUrl ? `<a class="qlink qlink-kal" href="${ev.kalEventUrl}" target="_blank" onclick="event.stopPropagation()">↗ Kalshi</a>` : ''}
            <span class="stag st-none" style="margin-left:6px">Нет расхождений</span>
          </div>
        </div>
      </div>`;
    return card;
  }

  // Spread badge from best candidate
  let spreadBadge;
  if (isArb)       spreadBadge = `<span class="stag st-arb">+${ev.arb.roi.toFixed(1)}% ROI</span>`;
  else if (isDiff) spreadBadge = `<span class="stag st-diff">↕ ${pct(ev.arb.diff)}</span>`;
  else             spreadBadge = `<span class="stag st-none">≈</span>`;

  // Build rows — only for candidates with divergence
  const rows = visibleCandidates.map(c => {
    const isArbC  = c.arb?.type === 'arb';
    const isDiffC = c.arb?.type === 'diff';
    const d = c.py - c.ky;

    let diffCell;
    if (isArbC) {
      diffCell = `<span class="cd-arb">🟢 +${c.arb.roi.toFixed(1)}%</span>`;
    } else {
      diffCell = `<span class="cd-diff ${d>0?'cd-pos':'cd-neg'}">${d>0?'▲':'▼'} ${pct(Math.abs(d))}</span>`;
    }

    // Action — direct links with what to buy
    let actionCell = '';
    if (isArbC) {
      const polyLabel = c.arb.polyBuy === 'YES' ? c.name : 'NO';
      const kalLabel  = c.arb.kalBuy  === 'YES' ? c.name : 'NO';
      actionCell = `
        <a class="act-link act-poly" href="${c.url}" target="_blank" onclick="event.stopPropagation()">
          Poly: ${polyLabel} (${Math.round(c.arb.polyPrice*100)}%)
        </a>
        ${c.kal?.url ? `<a class="act-link act-kal" href="${kalshiUrl(c.kal)}" target="_blank" onclick="event.stopPropagation()">
          Kalshi: ${kalLabel} (${Math.round(c.arb.kalPrice*100)}%)
        </a>` : ''}`;
    } else {
      // Just divergence — show which side is cheaper where
      const cheaperPoly  = d > 0; // Poly is higher → buy on Kalshi
      actionCell = cheaperPoly
        ? `<a class="act-link act-kal" href="${c.kal?.url ? kalshiUrl(c.kal) : '#'}" target="_blank" onclick="event.stopPropagation()">Дешевле на Kalshi (${Math.round(c.ky*100)}%)</a>`
        : `<a class="act-link act-poly" href="${c.url}" target="_blank" onclick="event.stopPropagation()">Дешевле на Poly (${Math.round(c.py*100)}%)</a>`;
    }

    return `<tr class="crow${isArbC?' crow-arb':isDiffC?' crow-diff':''}">
      <td class="ct-name">${c.name}</td>
      <td class="ct-poly">${Math.round(c.py*100)}% <small>${dec(c.py)}</small></td>
      <td class="ct-kal">${Math.round(c.ky*100)}% <small>${dec(c.ky)}</small></td>
      <td>${diffCell}</td>
      <td class="ct-action">${actionCell}</td>
    </tr>`;
  }).join('');

  const card = document.createElement('div');
  card.className = `card group-card${isArb?' arb':isDiff?' diff':''}`;
  card.style.animationDelay = Math.min(i*.025,.6)+'s';
  card.dataset.id = ev.id;
  card.innerHTML = `
    <div class="group-head">
      <div class="e-info">
        <div class="etitle">${ev.q}</div>
        <div class="emeta">
          <span class="cat-tag">${ev.cat}</span>
          <span class="vol-tag">VOL: ${ev.volS} · до ${ev.end}</span>
          <a class="qlink qlink-poly" href="${ev.url}" target="_blank" onclick="event.stopPropagation()">↗ Polymarket</a>
          ${ev.kalEventUrl ? `<a class="qlink qlink-kal" href="${ev.kalEventUrl}" target="_blank" onclick="event.stopPropagation()">↗ Kalshi</a>` : ''}
        </div>
      </div>
      <div class="group-badge">${spreadBadge}</div>
    </div>
    <div class="group-table-wrap">
      <table class="group-table">
        <thead><tr>
          <th>Кандидат / Исход</th>
          <th style="color:var(--poly)">Polymarket</th>
          <th style="color:var(--kalshi)">Kalshi</th>
          <th>Разница</th>
          <th>Где купить</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  return card;
}

        <div class="db-side">
          <span class="db-side-lbl no">✗ ${polyNoName}</span>

      </div>

    ${ev.ky!=null ? `
    <div class="db kal-b">

// ── Bookmakers detail box (SharpAPI) ─────────────────────────────────────────
function buildBookBox(ev) {
  const bm = ev.bm;
  if (!bm) {
    return `<div class="db book-b">
      <div class="db-lbl">📊 Букмекеры</div>
      <div class="db-nd">Нет данных · <a href="https://sharpapi.io" target="_blank" style="color:var(--book)">sharpapi.io</a></div>
    </div>`;
  }

  const books    = Object.entries(bm.bookmakers || {});
  const avgProb  = bm.yesProb;
  const homeTeam = bm.home_team || ev.yL || '';
  if (!books.length) return `<div class="db book-b"><div class="db-lbl">📊 Букмекеры</div><div class="db-nd">${homeTeam}: нет линий</div></div>`;

  books.sort((a, b) => (b[1].prob||0) - (a[1].prob||0));

  const bookRows = books.map(([key, b]) => {
    const prob  = b.prob || 0;
    const dec   = b.oddsDecimal ? b.oddsDecimal.toFixed(2) : '—';
    const amer  = b.oddsAmerican != null ? (b.oddsAmerican > 0 ? `+${b.oddsAmerican}` : `${b.oddsAmerican}`) : '';
    const diff  = prob - avgProb;
    const diffS = Math.abs(diff) >= 0.005
      ? `<span style="color:${diff>0?'var(--green)':'var(--red)'};font-size:9px">${diff>0?'+':''}${pct(diff)}</span>` : '';
    const evS   = b.evPct != null
      ? `<span style="color:${b.evPct>0?'var(--green)':'var(--muted)'};font-size:9px;margin-left:3px">${b.evPct>0?'+':''}${b.evPct.toFixed(1)}%EV</span>` : '';
    const link  = b.deepLink
      ? `<a href="${b.deepLink}" target="_blank" class="book-bet-link" onclick="event.stopPropagation()">Bet →</a>` : '';
    return `<div class="book-row">
      <span class="book-name">${b.name||key}</span>
      <span class="book-odds">${dec}${amer?` <small style="color:var(--muted)">${amer}</small>`:''}</span>
      <span class="book-prob">${Math.round(prob*100)}%</span>
      <span style="min-width:50px">${diffS}${evS}</span>
      ${link}
    </div>`;
  }).join('');

  const bestDec = bm.bestDecimal ? ` · лучший: <b>${bm.bestDecimal}</b>` : '';
  return `<div class="db book-b">
    <div class="db-lbl">📊 ${books.length} контор · ср. ${Math.round(avgProb*100)}%${bestDec}</div>
    <div class="db-yn">
      <div class="db-sub-hdr"><span>Контора</span><span>Коэфф</span><span>Вер.</span><span>±avg/EV</span><span></span></div>
      <div class="book-rows">${bookRows}</div>
    </div>
  </div>`;
}

function guessCat(q,tags){
  const t=((q||'')+JSON.stringify(tags||'')).toLowerCase();
  if(/trump|biden|election|president|congress|senate|government|vote|democrat|republic|ukraine|russia|war|nato|zelensky|putin|macron|modi/.test(t))return'Politics';
  if(/bitcoin|btc|eth|ethereum|crypto|defi|nft|token|coin|solana|doge|bnb/.test(t))return'Crypto';
  if(/nba|nfl|nhl|mlb|soccer|football|basketball|tennis|formula|f1|champion|league|match|team|playoff|world cup|premier|bundesliga/.test(t))return'Sports';
  if(/fed|rate|gdp|recession|inflation|economy|stock|earnings|bank|dollar|euro|cpi|unemployment/.test(t))return'Economics';
  return'Other';
}
