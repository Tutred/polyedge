<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PolyEdge — Polymarket vs Букмекеры</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--card:#171c26;--border:#242937;
  --text:#e8eaf0;--muted:#6b7280;--muted2:#4b5563;
  --green:#22c55e;--red:#ef4444;--yellow:#f59e0b;
  --poly:#00c2ff;--book:#f59e0b;
  --sans:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono','Fira Code',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
a{color:inherit;text-decoration:none}

/* ── TOP BAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:rgba(15,17,23,.95);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px)}
.logo{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--poly);letter-spacing:-.5px}
.logo span{color:var(--text);opacity:.5}
.stats{display:flex;gap:20px}
.hs{text-align:center}
.hs-v{font-family:var(--mono);font-size:20px;font-weight:700}
.hs-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}

/* ── STATUS BAR ── */
.sbar{display:flex;gap:6px;padding:8px 20px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.src{display:flex;align-items:center;gap:5px;font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid var(--border);font-family:var(--mono)}
.sd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.s-ok{border-color:rgba(34,197,94,.3)}
.s-err{border-color:rgba(239,68,68,.3)}
.s-wait{border-color:rgba(245,158,11,.2)}

/* ── FILTER BAR ── */
.fbar{display:flex;align-items:center;gap:6px;padding:10px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.fbtn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);font-size:11px;padding:5px 12px;border-radius:4px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.fbtn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.fbtn.fa{background:rgba(0,194,255,.1);border-color:rgba(0,194,255,.3);color:var(--poly)}
.fbtn.fg{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--yellow)}
.vsep{width:1px;height:20px;background:var(--border)}
.sort-sel{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:11px;padding:5px 8px;border-radius:4px;cursor:pointer}
.upd-r{margin-left:auto;font-size:10px;color:var(--muted);font-family:var(--mono)}
.upd-n{color:var(--yellow)}

/* ── TABLE HEADER ── */
.thead{display:grid;grid-template-columns:1fr 190px 190px 130px;gap:6px;padding:7px 20px;font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);border-bottom:1px solid var(--border)}

/* ── CARDS ── */
#list{padding:0 0 40px}
.card{background:var(--card);border-bottom:1px solid var(--border);transition:background .15s}
.card:hover{background:rgba(255,255,255,.01)}
.card.diff{border-left:2px solid var(--yellow)}
.crow{display:grid;grid-template-columns:1fr 190px 190px 130px;gap:6px;padding:13px 20px;align-items:center;cursor:pointer}
.e-info{min-width:0}
.etitle{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.emeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cat-tag{font-size:9px;padding:2px 6px;border-radius:2px;background:rgba(255,255,255,.06);color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}
.vol-tag{font-family:var(--mono);font-size:9px;color:var(--muted)}
.qlink{font-size:10px;padding:2px 7px;border-radius:2px;border:1px solid;font-family:var(--mono);opacity:.7;transition:opacity .15s}
.qlink:hover{opacity:1}
.qlink-poly{color:var(--poly);border-color:rgba(0,194,255,.25)}

/* ── PRICE CELL ── */
.pc{min-width:0}
.pc-src{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono);margin-bottom:4px}
.pc-row{display:flex;align-items:baseline;gap:5px;margin-bottom:3px}
.pc-outcome-name{font-size:11px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pc-val-main{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1;flex-shrink:0}
.pc.poly  .pc-val-main{color:var(--poly)}
.pc.book  .pc-val-main{color:var(--book)}
.pc-val-sub{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--muted2);flex-shrink:0}
.pc-odds-small{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0}
.pc-nd{font-size:11px;color:var(--muted);padding:6px 0}

/* ── SPREAD CELL ── */
.sc{text-align:center}
.stag{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;padding:4px 10px;border-radius:3px;border:1px solid}
.ssub{font-size:9px;color:var(--muted);margin-top:3px;font-family:var(--mono)}
.st-diff{background:rgba(245,158,11,.1);color:var(--yellow);border-color:rgba(245,158,11,.25)}
.st-none{background:rgba(255,255,255,.04);color:var(--muted);border-color:var(--border)}

/* ── DETAIL ── */
.detail{max-height:0;overflow:hidden;transition:max-height .3s ease}
.detail.open{max-height:2000px}
.det-inner{padding:16px 20px;border-top:1px solid var(--border);background:rgba(0,0,0,.2)}
.explain{padding:10px 14px;border-radius:4px;font-size:13px;line-height:1.7;margin-bottom:12px}
.explain.bookdiff{background:rgba(245,158,11,.07);border-left:3px solid var(--yellow)}
.dboxes{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:12px}
.db{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:12px}
.db.poly-b{border-color:rgba(0,194,255,.15)}
.db.book-b{border-color:rgba(245,158,11,.15)}
.db-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-family:var(--mono);margin-bottom:8px}
.db.poly-b .db-lbl{color:var(--poly)}
.db.book-b .db-lbl{color:var(--book)}
.db-side{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.db-side-lbl{font-size:11px;font-weight:600;flex:1}
.db-side-val{font-family:var(--mono);font-size:18px;font-weight:700}
.db-side-odds{font-family:var(--mono);font-size:11px;color:var(--muted)}
.dlinks{display:flex;gap:8px;margin-top:8px}
.dlink{font-size:11px;padding:5px 12px;border-radius:3px;border:1px solid;font-family:var(--mono);font-weight:600}
.dlink.poly{color:var(--poly);border-color:rgba(0,194,255,.3)}
.dlink.poly:hover{background:rgba(0,194,255,.08)}

/* ── BOOK ROWS ── */
.book-rows{max-height:280px;overflow-y:auto}
.db-sub-hdr{display:flex;gap:6px;padding:3px 4px;font-size:9px;color:var(--muted);border-bottom:1px solid var(--border);margin-bottom:3px}
.db-sub-hdr span:first-child{flex:1}
.book-row{display:flex;align-items:center;gap:6px;padding:2px 4px;border-radius:2px;font-size:10px;font-family:var(--mono)}
.book-row:hover{background:rgba(255,255,255,.04)}
.book-name{flex:1;color:var(--muted2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px;font-family:var(--sans);font-size:10px}
.book-odds{color:var(--book);font-weight:700;min-width:36px;text-align:right}
.book-prob{color:var(--text);min-width:30px;text-align:right}
.book-bet-link{font-size:9px;color:var(--green);text-decoration:none;border:1px solid rgba(34,197,94,.3);padding:1px 5px;border-radius:2px;white-space:nowrap;margin-left:4px}
.book-bet-link:hover{background:rgba(34,197,94,.1)}

/* ── SCREENS ── */
.screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:12px;color:var(--muted)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--poly);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.scr-txt{font-size:14px;text-align:center;max-width:360px;line-height:1.5}
.retry-btn{padding:8px 20px;background:rgba(0,194,255,.1);border:1px solid rgba(0,194,255,.3);color:var(--poly);border-radius:4px;cursor:pointer;font-size:12px}
.empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;line-height:2}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;right:20px;background:rgba(30,35,50,.95);border:1px solid var(--border);padding:10px 16px;border-radius:6px;font-size:12px;transform:translateY(80px);opacity:0;transition:all .3s;z-index:999;backdrop-filter:blur(8px);max-width:300px}
#toast.show{transform:translateY(0);opacity:1}
#toast.ok{border-color:rgba(34,197,94,.4)}

@media(max-width:700px){
  .thead{display:none}
  .crow{grid-template-columns:1fr 1fr;grid-template-rows:auto auto auto}
  .stats{gap:12px}
  .hs-v{font-size:15px}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">Poly<span>Edge</span></div>
  <div class="stats">
    <div class="hs"><div class="hs-v" id="hTotal">—</div><div class="hs-l">Событий</div></div>
    <div class="hs"><div class="hs-v" id="hDiff" style="color:var(--yellow)">—</div><div class="hs-l">Расхождений</div></div>
    <div class="hs"><div class="hs-v" id="hBook" style="color:var(--book)">—</div><div class="hs-l">vs Букмекеры</div></div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="sbar">
  <div class="src s-wait" id="srcPoly"><div class="sd" style="background:var(--yellow)"></div>Polymarket: загрузка...</div>
  <div class="src s-wait" id="srcBook"><div class="sd" style="background:var(--yellow)"></div>Букмекеры: загрузка...</div>
  <div class="src s-wait" id="srcAI">  <div class="sd" style="background:var(--yellow)"></div>Матчинг: ожидание...</div>
</div>

<!-- FILTER BAR -->
<div class="fbar">
  <button class="fbtn fa" onclick="setF('all',this)">Все события</button>
  <button class="fbtn"    onclick="setF('diff',this)">📊 vs Букмекеры ≥1%</button>
  <div class="vsep"></div>
  <button class="fbtn" onclick="setF('Sports',this)">Спорт</button>
  <button class="fbtn" onclick="setF('Politics',this)">Политика</button>
  <button class="fbtn" onclick="setF('Crypto',this)">Крипто</button>
  <button class="fbtn" onclick="setF('Economics',this)">Экономика</button>
  <div class="vsep"></div>
  <select class="sort-sel" onchange="setSort(this.value)">
    <option value="diff">По расхождению</option>
    <option value="vol">По объёму</option>
  </select>
  <span class="upd-r" id="updR">— · след. через <span class="upd-n" id="updN">—</span></span>
</div>

<div class="thead">
  <div>Событие</div>
  <div style="color:var(--poly)">Polymarket</div>
  <div style="color:var(--book)">Букмекеры</div>
  <div>Расхождение</div>
</div>

<main>
  <div id="scrLoad" class="screen"><div class="spinner"></div><div class="scr-txt" id="loadTxt">Загрузка...</div></div>
  <div id="scrErr"  class="screen" style="display:none"><div style="font-size:32px">⚠️</div><div class="scr-txt" id="errTxt">Ошибка</div><button class="retry-btn" onclick="loadAll()">Повторить</button></div>
  <div id="app" style="display:none"><div id="list"></div></div>
</main>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════
const REFRESH_SEC = 90;

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let events   = [];
let bookMap  = {};          // key → bookmaker market object
let filter   = 'all';
let sortBy   = 'diff';
let openId   = null;
let refreshTimer = null;
let countdown    = REFRESH_SEC;
let polyCache    = [];      // last fetched poly markets

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  loadAll();
  startCountdown();
});

// ════════════════════════════════════════════════════════
// LOAD
// ════════════════════════════════════════════════════════
async function loadAll() {
  showScr('load');
  setText('loadTxt', 'Загрузка Polymarket...');

  // 1. Polymarket — показываем сразу
  try {
    polyCache = await fetchPoly();
    setSrc('srcPoly', 'ok', `Polymarket: ${polyCache.length} маркетов ✓`);
  } catch(e) {
    setSrc('srcPoly', 'err', `Polymarket: ${e.message}`);
    setText('errTxt', `Ошибка Polymarket: ${e.message}`);
    showScr('err'); return;
  }

  events = buildEvents(polyCache);
  render();
  showScr('app');
  setText('updR', `Обновлено ${now()} · след. через `);
  toast(`✓ ${polyCache.length} событий Polymarket`, 'ok');

  // 2. Букмекеры — в фоне
  setSrc('srcBook', 'wait', 'Букмекеры: загрузка...');
  try {
    const j = await fetchOdds();
    bookMap = {};
    if (j.ok && j.markets?.length) {
      j.markets.forEach(bm => {
        bookMap[norm(bm.title)] = bm;
        if (bm.home_team) bookMap[norm(bm.home_team)] = bm;
      });
      const n = getMaxBooks(j.markets);
      setSrc('srcBook', 'ok', `Букмекеры: ${j.markets.length} событий · ${n} контор ✓`);
    } else if (j.error === 'NO_KEY') {
      setSrc('srcBook', 'wait', 'Букмекеры: добавь SHARP_API_KEY в Vercel → Settings → Env Vars');
    } else {
      setSrc('srcBook', 'wait', j.message || 'Букмекеры: нет данных');
    }
  } catch(e) {
    setSrc('srcBook', 'wait', `Букмекеры: ${e.message}`);
  }

  // Перестраиваем с данными букмекеров
  events = buildEvents(polyCache);
  const matched = events.filter(e => e.bookAvg != null).length;
  setSrc('srcAI', 'ok', `Матчинг: ${matched} событий с букмекерами ✓`);
  setText('hBook', matched);
  render();
  setText('updR', `Обновлено ${now()} · след. через `);
  countdown = REFRESH_SEC;
  if (matched) toast(`✓ ${matched} событий сравнено с букмекерами`, 'ok');
}

async function silentRefresh() {
  try {
    polyCache = await fetchPoly();
    setSrc('srcPoly', 'ok', `Polymarket: ${polyCache.length} маркетов ✓`);
    events = buildEvents(polyCache);
    render();

    const j = await fetchOdds();
    if (j.ok && j.markets?.length) {
      bookMap = {};
      j.markets.forEach(bm => {
        bookMap[norm(bm.title)] = bm;
        if (bm.home_team) bookMap[norm(bm.home_team)] = bm;
      });
      events = buildEvents(polyCache);
      const matched = events.filter(e => e.bookAvg != null).length;
      setText('hBook', matched);
      render();
    }
    setText('updR', `Обновлено ${now()} · след. через `);
  } catch(e) { console.warn('Refresh error:', e.message); }
}

// ════════════════════════════════════════════════════════
// FETCHERS
// ════════════════════════════════════════════════════════
async function fetchPoly() {
  const r = await fetch('/api/markets', { signal: AbortSignal.timeout(12000) });
  const j = await r.json();
  if (!j.ok || !j.markets?.length) throw new Error(j.error || 'empty');
  return j.markets;
}

async function fetchOdds() {
  const r = await fetch('/api/odds', { signal: AbortSignal.timeout(15000) });
  return r.json();
}

// ════════════════════════════════════════════════════════
// BUILD EVENTS
// ════════════════════════════════════════════════════════
function buildEvents(polyMarkets) {
  return polyMarkets
    .map(m => {
      const py = m.yesProb;
      if (!py || py < 0.02 || py > 0.98) return null;

      const bm       = findBook(m.question, py);
      const bookAvg  = bm?.yesProb ?? null;
      const yL       = m.outcomes?.[0] || 'Yes';
      const nL       = m.outcomes?.[1] || 'No';

      // Divergence: Polymarket vs bookmaker consensus
      let bookDiff = null;
      if (bookAvg != null) {
        const diff = py - bookAvg;
        if (Math.abs(diff) >= 0.01) {
          bookDiff = {
            diff:      Math.abs(diff),
            polyHigher: diff > 0,
            polyProb:   py,
            bookProb:   bookAvg,
            bookCount:  bm?.bookCount || 0,
            cheaperOn:  diff > 0 ? 'books' : 'polymarket',
            action:     diff > 0
              ? `YES дешевле у букмекеров (${pct(bookAvg)} vs ${pct(py)} на Poly)`
              : `YES дешевле на Polymarket (${pct(py)} vs ${pct(bookAvg)} у букмекеров)`,
          };
        }
      }

      return {
        id:  m.id,
        q:   m.question,
        yL, nL,
        cat: guessCat(m.question, m.tags),
        py, pn: 1 - py,
        bookAvg, bm, bookDiff,
        vol:  m.volume || 0,
        volS: fmtVol(m.volume || 0),
        end:  m.endDate ? new Date(m.endDate).toLocaleDateString('ru-RU',{day:'numeric',month:'short'}) : '—',
        url:  m.url || `https://polymarket.com/market/${m.slug||''}`,
      };
    })
    .filter(Boolean);
}

// ════════════════════════════════════════════════════════
// BOOK MATCHING
// Правила хорошего матча:
// 1. Обе команды должны упоминаться в вопросе Polymarket
// 2. Разница цен не более 25pp (иначе разные события)
// 3. Одинаковый вид спорта
// ════════════════════════════════════════════════════════
function norm(t) {
  return (t||'').toLowerCase().replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}

const STOP = new Set(['will','the','a','an','in','on','at','to','of','for','be','is','are',
  'was','by','or','and','that','this','with','have','not','win','wins','2026','2025','2027']);

function kws(t) {
  return norm(t).split(' ').filter(w => w.length > 2 && !STOP.has(w));
}

function findBook(q, polyYesProb) {
  if (!q || !Object.keys(bookMap).length) return null;

  const qNorm = norm(q);

  // Сезонные futures несовместимы с game-level odds
  const isSeasonFuture = /\b(nba finals|nfl super bowl|stanley cup|world series|super bowl|nba champion|nhl champion|championship|win the series|win the title|western conference final|eastern conference final|conference champion)\b/i.test(q);
  if (isSeasonFuture) return null;

  let best = null, bs = 0;

  for (const bm of Object.values(bookMap)) {
    if (!bm.home_team || !bm.away_team) continue;

    const homeN = norm(bm.home_team);
    const awayN = norm(bm.away_team);

    // Разбиваем на слова (фамилии, названия команд)
    const homeWords = homeN.split(' ').filter(w => w.length > 2);
    const awayWords = awayN.split(' ').filter(w => w.length > 2);
    if (!homeWords.length) continue;

    // Считаем сколько слов из обеих команд есть в вопросе
    const homeHits = homeWords.filter(w => qNorm.includes(w)).length;
    const awayHits = awayWords.filter(w => qNorm.includes(w)).length;
    const totalHits = homeHits + awayHits;

    // Минимум: хотя бы одно слово из home_team И суммарно 2+ совпадения
    // ИЛИ: оба участника найдены (хотя бы по 1 слову каждый)
    const bothFound = homeHits >= 1 && awayHits >= 1;
    const goodMatch = bothFound || (homeHits >= 2 && awayHits === 0);

    if (!goodMatch || totalHits < 2) continue;

    // Ценовой фильтр — max 20pp разница
    if (polyYesProb != null && bm.yesProb != null) {
      if (Math.abs(polyYesProb - bm.yesProb) > 0.20) continue;
    }

    if (totalHits > bs) { best = bm; bs = totalHits; }
  }

  return best;
}

function getMaxBooks(markets) {
  if (!markets.length) return 0;
  return Math.max(...markets.map(m => Object.keys(m.bookmakers || {}).length));
}

// ════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════
function render() {
  let list = [...events];

  if (filter === 'diff') list = list.filter(e => e.bookDiff != null);
  else if (filter !== 'all') list = list.filter(e => e.cat === filter);

  if (sortBy === 'diff') list.sort((a,b) => (b.bookDiff?.diff||0) - (a.bookDiff?.diff||0));
  else                   list.sort((a,b) => b.vol - a.vol);

  setText('hTotal', events.length);
  setText('hDiff',  events.filter(e => e.bookDiff != null).length);

  const el = $('list');
  el.innerHTML = '';
  if (!list.length) {
    el.innerHTML = `<div class="empty">Нет событий по фильтру.<br>
      ${filter==='diff' && !Object.keys(bookMap).length
        ? 'Добавь <b>SHARP_API_KEY</b> в Vercel чтобы видеть данные букмекеров.'
        : 'Попробуй «Все события».'}
    </div>`;
    return;
  }
  list.forEach((ev, i) => el.appendChild(makeCard(ev, i)));
}

// ════════════════════════════════════════════════════════
// CARD
// ════════════════════════════════════════════════════════
function makeCard(ev, i) {
  const hasDiff = ev.bookDiff != null;

  const polyCell = priceCell('poly', 'Polymarket', ev.py, ev.pn, ev.yL, ev.nL);
  const bookCell = ev.bookAvg != null
    ? priceCell('book', `${ev.bm?.bookCount||''}букм. · ${ev.bm?.home_team||''}`, ev.bookAvg, 1-ev.bookAvg, ev.yL, ev.nL)
    : `<div class="pc book"><div class="pc-src">Букмекеры</div><div class="pc-nd">нет данных</div></div>`;

  let spread;
  if (hasDiff) {
    const d = ev.bookDiff;
    spread = `<div class="sc">
      <div class="stag st-diff">📊 ${pct(d.diff)}</div>
      <div class="ssub">${d.cheaperOn==='books' ? 'Poly завышен' : 'Poly дешевле'}</div>
    </div>`;
  } else {
    spread = `<div class="sc"><div class="stag st-none">≈</div><div class="ssub">Согласуются</div></div>`;
  }

  const card = document.createElement('div');
  card.className = `card${hasDiff ? ' diff' : ''}`;
  card.style.animationDelay = Math.min(i * .025, .6) + 's';
  card.dataset.id = ev.id;
  card.innerHTML = `
    <div class="crow" onclick="toggleDet('${ev.id}')">
      <div class="e-info">
        <div class="etitle">${ev.q}</div>
        <div class="emeta">
          <span class="cat-tag">${ev.cat}</span>
          <span class="vol-tag">VOL: ${ev.volS} · до ${ev.end}</span>
          <a class="qlink qlink-poly" href="${ev.url}" target="_blank" onclick="event.stopPropagation()">↗ Polymarket</a>
        </div>
      </div>
      ${polyCell}${bookCell}${spread}
    </div>
    <div class="detail" id="det-${ev.id}"><div class="det-inner">${buildDetail(ev)}</div></div>`;
  return card;
}

function priceCell(cls, src, yes, no, yL, nL) {
  return `<div class="pc ${cls}">
    <div class="pc-src">${src}</div>
    <div class="pc-row">
      <span class="pc-outcome-name">${yL}</span>
      <span class="pc-val-main">${Math.round(yes*100)}%</span>
      <span class="pc-odds-small">${dec(yes)}</span>
    </div>
    <div class="pc-row">
      <span class="pc-outcome-name" style="color:var(--muted2)">${nL}</span>
      <span class="pc-val-sub">${Math.round(no*100)}%</span>
      <span class="pc-odds-small">${dec(no)}</span>
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════════
// DETAIL PANEL
// ════════════════════════════════════════════════════════
function buildDetail(ev) {
  let explain = '';
  if (ev.bookDiff) {
    const bd = ev.bookDiff;
    const icon = bd.cheaperOn === 'books' ? '📉' : '📈';
    const txt  = bd.cheaperOn === 'books'
      ? `Polymarket <strong>завышает</strong> «${ev.yL}» на ${pct(bd.diff)} vs букмекеры`
      : `Polymarket <strong>занижает</strong> «${ev.yL}» на ${pct(bd.diff)} vs букмекеры`;
    explain = `<div class="explain bookdiff">
      ${icon} <strong>Расхождение ${pct(bd.diff)}</strong><br>
      ${txt}<br>
      Polymarket: <strong>${Math.round(bd.polyProb*100)}%</strong> &nbsp;·&nbsp;
      Ср. ${bd.bookCount} контор: <strong>${Math.round(bd.bookProb*100)}%</strong><br><br>
      <em>${bd.action}</em>
    </div>`;
  }

  const boxes = `<div class="dboxes">
    <div class="db poly-b">
      <div class="db-lbl">⬡ Polymarket</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;line-height:1.4">${ev.q}</div>
      <div class="db-side">
        <span class="db-side-lbl" style="color:var(--green)">✓ ${ev.yL}</span>
        <span class="db-side-val" style="color:var(--green)">${Math.round(ev.py*100)}%</span>
        <span class="db-side-odds">${dec(ev.py)}</span>
      </div>
      <div class="db-side">
        <span class="db-side-lbl" style="color:var(--red)">✗ ${ev.nL}</span>
        <span class="db-side-val" style="color:var(--red)">${Math.round(ev.pn*100)}%</span>
        <span class="db-side-odds">${dec(ev.pn)}</span>
      </div>
    </div>
    ${buildBookBox(ev)}
  </div>`;

  return explain + boxes + `<div class="dlinks">
    <a href="${ev.url}" target="_blank" class="dlink poly">↗ Polymarket</a>
  </div>`;
}

function buildBookBox(ev) {
  const bm = ev.bm;
  if (!bm) return `<div class="db book-b">
    <div class="db-lbl">📊 Букмекеры</div>
    <div style="font-size:11px;color:var(--muted);padding:4px 0">Добавь SHARP_API_KEY в Vercel</div>
  </div>`;

  const books   = Object.entries(bm.bookmakers || {}).sort((a,b) => (b[1].prob||0)-(a[1].prob||0));
  const avg     = bm.yesProb;
  if (!books.length) return `<div class="db book-b"><div class="db-lbl">📊 Букмекеры</div><div class="pc-nd">нет линий</div></div>`;

  const rows = books.map(([key, b]) => {
    const prob  = b.prob || 0;
    const d     = prob - avg;
    const dStr  = Math.abs(d) >= 0.005
      ? `<span style="color:${d>0?'var(--green)':'var(--red)'};font-size:9px">${d>0?'+':''}${pct(d)}</span>` : '';
    const evStr = b.evPct != null
      ? `<span style="color:${b.evPct>0?'var(--green)':'var(--muted)'};font-size:9px;margin-left:2px">${b.evPct>0?'+':''}${b.evPct.toFixed(1)}%EV</span>` : '';
    const link  = b.deepLink
      ? `<a href="${b.deepLink}" target="_blank" class="book-bet-link" onclick="event.stopPropagation()">Bet→</a>` : '';
    return `<div class="book-row">
      <span class="book-name">${b.name||key}</span>
      <span class="book-odds">${b.oddsDecimal?.toFixed(2)||'—'}</span>
      <span class="book-prob">${Math.round(prob*100)}%</span>
      <span style="min-width:50px;text-align:right">${dStr}${evStr}</span>
      ${link}
    </div>`;
  }).join('');

  const matchTitle = bm.title || (bm.home_team && bm.away_team ? `${bm.home_team} vs ${bm.away_team}` : '');
  return `<div class="db book-b">
    <div class="db-lbl">📊 Букмекеры</div>
    ${matchTitle ? `<div style="font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.4">${matchTitle}</div>` : ''}
    <div style="font-size:9px;color:var(--muted2);font-family:var(--mono);margin-bottom:6px">${books.length} контор · ср. ${Math.round(avg*100)}%${bm.bestDecimal ? ` · лучший: ${bm.bestDecimal}` : ''}</div>
    <div class="db-sub-hdr"><span>Контора</span><span>Коэфф</span><span>Вер.</span><span>±avg/EV</span><span></span></div>
    <div class="book-rows">${rows}</div>
  </div>`;
}

function toggleDet(id) {
  const el = document.getElementById(`det-${id}`);
  if (!el) return;
  const wasOpen = el.classList.contains('open');
  if (openId && openId !== id) {
    const prev = document.getElementById(`det-${openId}`);
    if (prev) prev.classList.remove('open');
  }
  el.classList.toggle('open', !wasOpen);
  openId = wasOpen ? null : id;
}

// ════════════════════════════════════════════════════════
// FILTER / SORT
// ════════════════════════════════════════════════════════
function setF(f, btn) {
  filter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('fa','fg'));
  btn.classList.add(f==='diff' ? 'fg' : 'fa');
  render();
}
function setSort(v) { sortBy = v; render(); }

// ════════════════════════════════════════════════════════
// AUTO REFRESH
// ════════════════════════════════════════════════════════
function startCountdown() {
  if (refreshTimer) clearInterval(refreshTimer);
  countdown = REFRESH_SEC;
  refreshTimer = setInterval(() => {
    countdown--;
    const el = $('updN');
    if (el) el.textContent = countdown + 'с';
    if (countdown <= 0) { countdown = REFRESH_SEC; silentRefresh(); }
  }, 1000);
}

function manualRefresh() { loadAll(); startCountdown(); }

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
function guessCat(q, tags) {
  const t = ((q||'') + JSON.stringify(tags||'')).toLowerCase();
  if (/trump|biden|election|president|congress|senate|vote|democrat|republic|ukraine|russia|war|nato/.test(t)) return 'Politics';
  if (/bitcoin|btc|eth|ethereum|crypto|defi|nft|token|coin|solana/.test(t)) return 'Crypto';
  if (/nba|nfl|nhl|mlb|soccer|football|basketball|tennis|formula|f1|champion|league|match|team|playoff|ufc/.test(t)) return 'Sports';
  if (/fed|rate|gdp|recession|inflation|economy|stock|earnings|bank|dollar|cpi/.test(t)) return 'Economics';
  return 'Other';
}

const dec     = p  => (1/p).toFixed(2) + 'x';
const pct     = v  => (v*100).toFixed(1) + '%';
const $       = id => document.getElementById(id);
const setText = (id, t) => { const e = $(id); if (e) e.textContent = t; };
const now     = () => new Date().toLocaleTimeString('ru-RU');
function fmtVol(v) { if(v>=1e9) return '$'+(v/1e9).toFixed(1)+'B'; if(v>=1e6) return '$'+(v/1e6).toFixed(1)+'M'; if(v>=1e3) return '$'+(v/1e3).toFixed(0)+'K'; return '$'+v.toFixed(0); }
function showScr(n) { $('scrLoad').style.display = n==='load'?'':'none'; $('scrErr').style.display = n==='err'?'':'none'; $('app').style.display = n==='app'?'':'none'; }
function setSrc(id, t, text) { const e=$(id),c=t==='ok'?'s-ok':t==='err'?'s-err':'s-wait',col=t==='ok'?'var(--green)':t==='err'?'var(--red)':'var(--yellow)'; e.className=`src ${c}`; e.innerHTML=`<div class="sd" style="background:${col}"></div>${text}`; }
function toast(msg, t='') { const e=$('toast'); e.textContent=msg; e.className='show '+t; setTimeout(()=>{ e.className=''; }, 3000); }
</script>
